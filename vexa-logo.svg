<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1D24" />
      <stop offset="100%" stop-color="#090A0C" />
    </linearGradient>
    
    <!-- Accent Gradient (Lime) -->
    <linearGradient id="limeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4FF32" />
      <stop offset="100%" stop-color="#A5C91B" />
    </linearGradient>

    <!-- Subtle Shadow for depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Dark Premium Rounded Background -->
  <rect width="400" height="400" rx="90" fill="url(#bgGrad)" />

  <!-- Outer V Shape (Lime Green) representing Vexa -->
  <path d="M110 150 L200 290 L290 150" 
        fill="none" 
        stroke="url(#limeGrad)" 
        stroke-width="48" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#shadow)" />

  <!-- Inner Downward Line (White) completing the Download Arrow -->
  <path d="M200 90 L200 230" 
        fill="none" 
        stroke="#FFFFFF" 
        stroke-width="48" 
        stroke-linecap="round" 
        filter="url(#shadow)" />
</svg>
